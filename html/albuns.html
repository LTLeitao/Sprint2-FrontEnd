<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Álbuns</title>
</head>
<body>
    <div class="phone albums-screen">
        <div class="albums-top">
            <span>9:41</span>

            <div class="top-icons">
                <i class="fa-solid fa-circle"></i>
                <i class="fa-solid fa-circle"></i>
            </div>
        </div>

        <header class="albums-header">
            <a href="../index.html">Cancelar</a>
            <h1>Adicionar ao álbum</h1>
            <a href="../index.html">Pronto</a>
        </header>

        <section class="albums-subtitle">
            <p>Selecione um álbum ou crie um novo</p>
        </section>

        <section class="new-album">
            <button>
                <i class="fa-solid fa-plus"></i>
            </button>
            <p>Criar novo álbum</p>
        </section>

        <section class="albums-list">
            <div class="album-card">
                <div class="album-left">
                    <div class="album-color purple"></div>
                    <div>
                        <h2>Viagem 2025</h2>
                        <p>341 fotos</p>
                    </div>
                </div>

                <input type="checkbox" class="album-checkbox">
            </div>

            <div class="album-card">
                <div class="album-left">
                    <div class="album-color green"></div>

                    <div>
                        <h2>Natureza</h2>
                        <p>126 fotos</p>
                    </div>
                </div>

                <input type="checkbox" class="album-checkbox">
            </div>

            <div class="album-card">
                <div class="album-left">
                    <div class="album-color orange"></div>

                    <div>
                        <h2>Família</h2>
                        <p>89 fotos</p>
                    </div>
                </div>

                <input type="checkbox" class="album-checkbox">
            </div>

            <div class="album-card">
                <div class="album-left">
                    <div class="album-color blue"></div>

                    <div>
                        <h2>Documentos trabalho</h2>
                        <p>22 fotos</p>
                    </div>
                </div>

                <input type="checkbox" class="album-checkbox">
            </div>

            <div class="album-card disabled">
                <div class="album-left">
                    <div class="album-color dark"></div>

                    <div>
                        <h2>Capturas de tela</h2>
                        <p>53 fotos</p>
                    </div>
                </div>

                <input type="checkbox" class="album-checkbox">
            </div>
        </section>

        <footer>
            <a href="../index.html">
                <i class="fa-solid fa-house"></i>
                Início
            </a>

            <a href="./galeria.html">
                <i class="fa-solid fa-images"></i>
                Galeria
            </a>

            <a href="./favoritos.html">
                <i class="fa-solid fa-heart"></i>
                Favoritos
            </a>

            <a href="./ocr.html">
                <i class="fa-solid fa-text-height"></i>
                OCR
            </a>
        </footer>
    </div>
</body>
</html>

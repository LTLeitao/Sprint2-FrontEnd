<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>OptiCam - Câmera</title>
</head>
<body>
    <div class="phone camera-screen">

        <a href="../index.html" class="back-btn">
            <i class="fa-solid fa-chevron-left"></i>
        </a>

        <section class="camera-tags">
            <span class="tag yellow">Baixa luminosidade</span>
            <span class="tag green">1 rosto</span>
            <span class="tag blue">Texto</span>
        </section>

        <section class="focus-area">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>

            <div class="detected-box">
                <span>Rosto detectado</span>
            </div>
        </section>

        <section class="camera-tip">
            <p>Mova levemente para a direita para um melhor enquadramento</p>
        </section>

        <section class="camera-bottom">
            <div class="camera-zoom">
                <button>1x</button>
            </div>

            <div class="camera-modes">
                <p class="active">Auto AI</p>
                <p>Retrato</p>
                <p>Vívid</p>
                <p>Mono</p>
                <p>Custom</p>
            </div>

            <div class="capture-section">
                <button class="rotate-btn">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>

                <button class="capture-btn"></button>
                <div class="camera-flash"></div>

                <button class="gallery-btn"></button>
            </div>
        </section>
    </div>
</body>
</html>

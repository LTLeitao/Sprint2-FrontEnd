<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Favoritos</title>
</head>
<body>
    <div class="phone favorites-screen">

        <section class="gallery-header">
            <div>
                <h1>Favoritos</h1>
                <p class="favorites-count">
                    12 fotos favoritadas
                </p>
            </div>

            <div class="gallery-icons">
                <button>
                    <i class="fa-solid fa-sliders"></i>
                </button>

                <button>
                    <i class="fa-solid fa-ellipsis"></i>
                </button>
            </div>
        </section>

        <section class="gallery-tabs">
            <a href="./galeria.html" class="tab-link">
                Recentes
            </a>

            <button class="active-tab">
                Mais curtidas
            </button>

            <a href="./albuns.html" class="tab-link">
                Álbuns
            </a>
        </section>

        <section class="gallery-search">
            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                placeholder="Pesquisar favoritos..."
            >
        </section>

        <section class="favorites-grid">

            <div class="favorite-photo purple-card large">
                <input
                    type="checkbox"
                    class="favorite-checkbox"
                    id="fav1"
                    checked
                >

                <label for="fav1" class="favorite-btn">
                    <i class="fa-solid fa-heart"></i>
                </label>
            </div>

            <div class="favorite-photo green-card">
                <input
                    type="checkbox"
                    class="favorite-checkbox"
                    id="fav2"
                    checked
                >

                <label for="fav2" class="favorite-btn">
                    <i class="fa-solid fa-heart"></i>
                </label>
            </div>

            <div class="favorite-photo orange-card">
                <input
                    type="checkbox"
                    class="favorite-checkbox"
                    id="fav3"
                    checked
                >

                <label for="fav3" class="favorite-btn">
                    <i class="fa-solid fa-heart"></i>
                </label>
            </div>

            <div class="favorite-photo blue-card">

                <input
                    type="checkbox"
                    class="favorite-checkbox"
                    id="fav4"
                    checked
                >

                <label for="fav4" class="favorite-btn">
                    <i class="fa-solid fa-heart"></i>
                </label>
            </div>

            <div class="favorite-photo dark-green-card">
                <input
                    type="checkbox"
                    class="favorite-checkbox"
                    id="fav5"
                    checked
                >

                <label for="fav5" class="favorite-btn">
                    <i class="fa-solid fa-heart"></i>
                </label>
            </div>
        </section>

        <footer>
            <a href="../index.html">
                <i class="fa-solid fa-house"></i>
                Início
            </a>

            <a href="./albuns.html">
                <i class="fa-solid fa-images"></i>
                Galeria
            </a>

            <a href="./favoritos.html">
                <i class="fa-solid fa-heart"></i>
                Favoritos
            </a>

            <a href="./ocr.html">
                <i class="fa-solid fa-text-height"></i>
                OCR
            </a>
        </footer>
    </div>
</body>
</html>
